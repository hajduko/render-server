{% extends "base.html" %} {% block title %}Home{% endblock %} {% block content %}

<div class="row">
  <div class="col-4">
    <div class="card">
      <div class="card-body">
        <h2 class="mb-4">Upload Project</h2>
        <form id="upload-form" method="post" action="/upload" enctype="multipart/form-data">
          <div class="d-flex flex-column gap-3">
            <input class="form-control w-100" name="pid" placeholder="LEAD code (e.g. L000073)" required />

            <div>
              <label class="form-label">Photos:</label>
              <input id="files" class="form-control w-100" type="file" name="files" multiple required />
            </div>

            <div>
              <label class="form-label">Other documents:</label>
              <input id="others" class="form-control w-100" type="file" name="others" multiple />
            </div>

            <button class="btn btn-primary w-100" type="submit">Upload project</button>

            <progress id="progress" class="progress w-100" value="0" max="100"></progress>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-8">
    <div class="card">
      <div class="card-body">
        <h2 class="mb-4">Projects</h2>
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th class="w-25">LEAD code</th>
              <th class="w-25">Status</th>
              <th class="w-50">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for project in projects %}
            <tr>
              <th>{{ project.pid }}</th>
              <td>{{ project.status }}</td>
              <td>
                <a href="/project/{{ project.pid }}" class="btn btn-success"> <i class="bi bi-cube"></i> View </a>
                <a href="/logs/{{ project.pid }}" class="btn btn-outline-secondary ms-2">
                  <i class="bi bi-file-text"></i> Logs
                </a>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

{% endblock %} {% block body_scripts %}

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.getElementById('upload-form');
    const fileElem = document.getElementById('files');
    const progress = document.getElementById('progress');

    if (!form || !fileElem || !progress) return;

    form.addEventListener('submit', function (e) {
      const files = fileElem.files;
      if (!files || files.length === 0) return;

      e.preventDefault();
      progress.value = 0;

      const formData = new FormData(form);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', form.action);

      xhr.upload.addEventListener('progress', function (e) {
        if (e.lengthComputable) {
          progress.value = (e.loaded / e.total) * 100;
        }
      });

      xhr.addEventListener('load', function () {
        if (xhr.status >= 200 && xhr.status < 400) {
          progress.value = 100;
          window.location.href = '/dashboard';
        } else {
          alert('Upload failed: ' + xhr.status + ' ' + xhr.statusText);
        }
      });

      xhr.addEventListener('error', function () {
        alert('Upload error, please try again.');
      });

      xhr.send(formData);
    });
  });

  (function setupAutoRefresh() {
    // If you keep <td><p class="m-0">status</p></td> then use the old selector
    // Otherwise use this selector for the 2nd column:
    const statusCells = document.querySelectorAll('tbody tr td:nth-child(2)');
    let hasRunning = false;

    statusCells.forEach(function (el) {
      const text = (el.textContent || '').toLowerCase();
      if (text.includes('running')) hasRunning = true;
    });

    if (hasRunning) {
      setInterval(function () {
        window.location.reload();
      }, 600000); // 10 minutes
    }
  })();
</script>

{% endblock %}
